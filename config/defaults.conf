# BatchVentoyDeployer configuration
# Edit this file to customise behaviour without touching the scripts.
 
# Ventoy version to download and install
VENTOY_VERSION="1.1.11"
 
# Derived Ventoy paths (do not edit)
VENTOY_ARCHIVE="ventoy-${VENTOY_VERSION}-linux.tar.gz"
VENTOY_DIR="ventoy-${VENTOY_VERSION}"
VENTOY_SCRIPT="./${VENTOY_DIR}/Ventoy2Disk.sh"
VENTOY_URL="https://github.com/ventoy/Ventoy/releases/download/v${VENTOY_VERSION}/${VENTOY_ARCHIVE}"
 
# Directory to read ISO files from
# Defaults to ~/ISOs of the invoking user (not root)
REAL_USER="${SUDO_USER:-$USER}"
ISO_SRC="$(getent passwd "$REAL_USER" | cut -d: -f6)/ISOs"

# Marker file used for storing installed Ventoy version and to detect when script update is needed
MARKER_FILE="${HOME}/.local/share/batchventoydeployer/.setup-complete"
 
# Log file
LOG_FILE="/var/log/batchventoydeployer.log"
 